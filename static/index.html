<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⛽ 진짜 최저가 주유소</title>
<!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1f6feb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="최저가주유소">
<link rel="apple-touch-icon" href="/static/icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ─── Header ─── */
.header {
  background: #161b22;
  padding: 14px 18px;
  border-bottom: 1px solid #30363d;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-left h1 { font-size: 17px; font-weight: 700; }
.header-left p  { font-size: 11px; color: #8b949e; margin-top: 2px; }
.btn-icon {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e6edf3;
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}

/* ─── Content ─── */
.main { padding: 16px; }

/* ─── Card ─── */
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}
.card-title {
  font-size: 12px;
  color: #8b949e;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ─── Fuel tabs ─── */
.fuel-tabs {
  display: flex;
  background: #0d1117;
  border-radius: 10px;
  padding: 3px;
  gap: 3px;
}
.fuel-tab {
  flex: 1;
  padding: 9px 0;
  text-align: center;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  border: none;
  background: none;
  color: #8b949e;
  transition: all 0.2s;
}
.fuel-tab.active { background: #1f6feb; color: #fff; }

/* ─── Input row ─── */
.input-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}
.input-group label {
  display: block;
  font-size: 12px;
  color: #8b949e;
  margin-bottom: 5px;
}
.input-group input, .input-group select {
  width: 100%;
  background: #0d1117;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 9px 11px;
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
}
.input-group input:focus, .input-group select:focus {
  outline: none;
  border-color: #1f6feb;
}

/* ─── Range ─── */
.range-row { margin-top: 12px; }
.range-row label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 6px; }
input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: #30363d; border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #1f6feb; cursor: pointer;
  border: 2px solid #0d1117;
  box-shadow: 0 0 0 2px #1f6feb44;
}

/* ─── Search button ─── */
.btn-search {
  width: 100%;
  background: #1f6feb;
  color: #fff;
  border: none;
  padding: 15px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: -0.3px;
  transition: opacity 0.2s;
}
.btn-search:active { opacity: 0.8; }
.btn-search:disabled { background: #21262d; color: #484f58; cursor: default; }

/* ─── Status ─── */
.status {
  text-align: center;
  padding: 14px;
  background: #161b22;
  border-radius: 10px;
  font-size: 14px;
  color: #8b949e;
  margin-top: 14px;
}
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid #30363d;
  border-top-color: #1f6feb;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Map ─── */
#map-container { margin-top: 14px; display: none; }
#map { width: 100%; height: 320px; border-radius: 14px; overflow: hidden; border: 1px solid #30363d; z-index: 0; }
/* Leaflet 팝업 스타일 커스텀 */
.leaflet-popup-content-wrapper {
  background: #161b22; color: #e6edf3; border: 1px solid #30363d;
  border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.6);
}
.leaflet-popup-tip { background: #161b22; }
.leaflet-popup-content { margin: 10px 14px; font-size: 13px; line-height: 1.6; }
.popup-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.popup-row { display: flex; justify-content: space-between; gap: 12px; }
.popup-val { font-weight: 700; }
.popup-val.green { color: #3fb950; }
.popup-val.red   { color: #f85149; }
.popup-val.blue  { color: #58a6ff; }

/* ─── Results header ─── */
.results-meta {
  font-size: 12px;
  color: #8b949e;
  margin: 14px 0 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ─── Station card ─── */
.station-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
}
.station-card:active { transform: scale(0.98); }
.station-card:hover  { border-color: #58a6ff; }
.station-card.focused { border-color: #1f6feb; box-shadow: 0 0 0 2px #1f6feb44; }
.station-card.rank1 { border-color: #238636; }
.station-card.rank1::after {
  content: '✅ 실질 최저가';
  position: absolute;
  top: 0; right: 0;
  background: #238636;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 0 14px 0 8px;
}

.station-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.rank-badge {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: #21262d;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  flex-shrink: 0;
}
.rank-badge.r1 { background: #d4a017; color: #000; }
.rank-badge.r2 { background: #6e7681; color: #fff; }
.rank-badge.r3 { background: #8a4a00; color: #fff; }
.station-name { font-size: 16px; font-weight: 700; line-height: 1.2; }
.station-sub  { font-size: 12px; color: #8b949e; margin-top: 2px; }

/* ─── Metrics grid ─── */
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.metric {
  background: #0d1117;
  border-radius: 10px;
  padding: 9px 11px;
}
.metric-label { font-size: 11px; color: #8b949e; margin-bottom: 3px; }
.metric-value { font-size: 15px; font-weight: 700; }
.c-red    { color: #f85149; }
.c-green  { color: #3fb950; }
.c-blue   { color: #58a6ff; }
.c-orange { color: #d29922; }
.metric-full {
  grid-column: 1 / -1;
  background: #0d1117;
  border-radius: 10px;
  padding: 9px 11px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.metric-full .metric-label { margin-bottom: 0; }

/* ─── Saving bar ─── */
.saving-bar {
  height: 3px;
  background: #238636;
  border-radius: 2px;
  margin-top: 10px;
  transition: width 0.4s ease;
}

/* ─── Modal ─── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: flex-end;
}
.overlay.open { display: flex; }
.modal {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 18px;
}
.modal-title { font-size: 18px; font-weight: 700; }
.modal-close {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e6edf3;
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.section-label {
  font-size: 12px;
  color: #8b949e;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin: 16px 0 8px;
}
.section-label:first-of-type { margin-top: 0; }
.help-text { font-size: 12px; color: #8b949e; margin-top: 5px; line-height: 1.5; }
.btn-save {
  width: 100%;
  background: #238636;
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
}
.tag {
  display: inline-block;
  background: #1f6feb22;
  color: #58a6ff;
  border: 1px solid #1f6feb44;
  border-radius: 6px;
  font-size: 11px;
  padding: 2px 7px;
  margin-left: 6px;
  vertical-align: middle;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #8b949e;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }
</style>

<body>

<!-- ═══ Header ═══ -->
<div class="header">
  <div class="header-left">
    <h1>⛽ 진짜 최저가 주유소</h1>
    <p>이동 기름값까지 뺀 실질 최저가</p>
  </div>
  <button class="btn-icon" onclick="openSettings()" title="설정">⚙️</button>
</div>

<!-- ═══ Main ═══ -->
<div class="main">

  <!-- 검색 조건 카드 -->
  <div class="card">
    <div class="card-title">유종 선택</div>
    <div class="fuel-tabs" id="fuelTabs">
      <button class="fuel-tab active" onclick="setFuel('B027',this)">휘발유</button>
      <button class="fuel-tab" onclick="setFuel('B034',this)">고급휘발유</button>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label>내 차 연비 (km/L)</label>
        <input type="number" id="efficiency" value="12" min="3" max="50" step="0.5">
      </div>
      <div class="input-group">
        <label>주유할 양 (L)</label>
        <input type="number" id="fillAmount" value="40" min="5" max="120">
      </div>
    </div>

    <div class="range-row">
      <label>검색 반경: <strong id="radiusLabel">3</strong>km
        <span style="font-size:11px;color:#484f58"> (최대 10km)</span>
      </label>
      <input type="range" id="radius" min="1" max="10" value="3" step="1"
        oninput="document.getElementById('radiusLabel').textContent=this.value">
    </div>
  </div>

  <!-- 검색 버튼 -->
  <button class="btn-search" id="searchBtn" onclick="search()">
    📍 내 위치에서 최저가 찾기
  </button>

  <!-- 상태 메시지 -->
  <div id="statusArea"></div>

  <!-- 지도 -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- 결과 -->
  <div id="results"></div>
</div>

<!-- ═══ Settings Modal ═══ -->
<div class="overlay" id="settingsOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚙️ 설정</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>

    <div class="section-label">오피넷 API 키 <span class="tag">필수</span></div>
    <div class="input-group">
      <input type="text" id="opinetKey" placeholder="ex) F1A2B3C4D5E6F7G8">
      <p class="help-text">
        <a href="#" onclick="return false" style="color:#58a6ff">opinet.co.kr</a> →
        로그인 → 오픈API 신청 → 일반 API (무료, 당일 발급)
      </p>
    </div>

    <div class="section-label">카카오 REST API 키 <span class="tag">선택 — 실도로 거리</span></div>
    <div class="input-group">
      <input type="text" id="kakaoRestKey" placeholder="REST API 키">
      <p class="help-text">
        <a href="#" onclick="return false" style="color:#58a6ff">developers.kakao.com</a> →
        내 앱 만들기 → 앱 키 → REST API 키<br>
        없으면 직선거리×1.4로 추정 (오차 ±15%)
      </p>
    </div>

    <div class="section-label">카카오 JavaScript 키 <span class="tag">선택 — 지도 표시</span></div>
    <div class="input-group">
      <input type="text" id="kakaoJsKey" placeholder="JavaScript 키 (위와 같은 앱에서)">
      <p class="help-text">지도 위에 주유소 위치를 표시합니다.</p>
    </div>

    <button class="btn-save" onclick="saveSettings()">저장</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const S = {
  fuelType: 'B027',
  myLat: null,
  myLng: null,
  kakaoReady: false,
};

// ══════════════════════════════════════════
//  SETTINGS
// ══════════════════════════════════════════
function gs(k) { return localStorage.getItem(k) || ''; }
function ss(k, v) { localStorage.setItem(k, v); }

function loadSettings() {
  ['opinetKey','kakaoRestKey','kakaoJsKey'].forEach(k => {
    const el = document.getElementById(k);
    if (el) el.value = gs(k);
  });
}

function saveSettings() {
  ['opinetKey','kakaoRestKey','kakaoJsKey'].forEach(k => {
    const el = document.getElementById(k);
    if (el) ss(k, el.value.trim());
  });
  closeSettings();
  toast('저장되었습니다');
}

function openSettings()  { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === e.currentTarget) closeSettings(); }

function setFuel(type, btn) {
  S.fuelType = type;
  document.querySelectorAll('.fuel-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}

// ══════════════════════════════════════════
//  MAIN SEARCH
// ══════════════════════════════════════════
async function search() {
  // 로컬 키 없어도 서버 환경변수로 동작 가능 — 그냥 진행
  if (!gs('opinetKey') && !S.serverHasKey) {
    alert('⚙️ 설정에서 오피넷 API 키를 먼저 입력해주세요.');
    openSettings();
    return;
  }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('results').innerHTML = '';
  document.getElementById('map-container').style.display = 'none';

  try {
    setStatus('<span class="spinner"></span> 현재 위치 확인 중...');
    const pos = await geolocate();
    S.myLat = pos.coords.latitude;
    S.myLng = pos.coords.longitude;

    setStatus('<span class="spinner"></span> 오피넷에서 주유소 조회 중...');
    const stations = await fetchStations();

    if (!stations.length) {
      setStatus('❌ 반경 내에 해당 유종을 판매하는 주유소가 없습니다.');
      return;
    }

    const eff   = parseFloat(document.getElementById('efficiency').value) || 12;
    const fill  = parseFloat(document.getElementById('fillAmount').value) || 40;
    const refPrice = Math.round(stations.reduce((s, st) => s + st.price, 0) / stations.length);

    let ranked;
    if (gs('kakaoRestKey')) {
      setStatus(`<span class="spinner"></span> 카카오 경로 계산 중 (0/${Math.min(stations.length,15)})...`);
      ranked = await rankWithKakao(stations, eff, fill, refPrice);
    } else {
      ranked = rankStraightLine(stations, eff, fill, refPrice);
    }

    setStatus('');
    renderResults(ranked, refPrice);

    renderMap(ranked);
  } catch (err) {
    setStatus('❌ ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════
//  GEOLOCATION
// ══════════════════════════════════════════
function geolocate() {
  return new Promise((res, rej) => {
    if (!navigator.geolocation) { rej(new Error('이 브라우저는 위치 서비스를 지원하지 않습니다.')); return; }
    navigator.geolocation.getCurrentPosition(res,
      err => rej(new Error('위치 권한 거부 또는 타임아웃: ' + err.message)),
      { enableHighAccuracy: true, timeout: 12000 }
    );
  });
}

// ══════════════════════════════════════════
//  OPINET API  (Flask proxy 경유)
// ══════════════════════════════════════════
async function fetchStations() {
  const radius = parseInt(document.getElementById('radius').value) * 1000;
  const url = `/api/stations?code=${encodeURIComponent(gs('opinetKey'))}&y=${S.myLat}&x=${S.myLng}&radius=${radius}&prodcd=${S.fuelType}`;

  const resp = await fetch(url);
  if (!resp.ok) throw new Error('서버 오류 ' + resp.status);
  const data = await resp.json();

  if (data.error) throw new Error(data.error);

  // 서버가 좌표 변환 완료 후 반환 (stations 배열)
  return (data?.stations || []).filter(s => s.price > 0);
}

// ══════════════════════════════════════════
//  DISTANCE HELPERS
// ══════════════════════════════════════════
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r, dLng = (lng2 - lng1) * r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); // km
}

function calcMetrics(distKm, price, eff, fill, refPrice) {
  const travelCost  = (distKm / eff) * refPrice;      // 이동 연료비 (원)
  const totalCost   = fill * price + travelCost;       // 총비용
  const effPrice    = totalCost / fill;                // 실질 단가
  return { distKm, travelCost, totalCost, effPrice };
}

// ── 직선거리 × 1.4 추정 ──
// ── 오피넷 제공 직선거리 사용 (기본) ──
function rankStraightLine(stations, eff, fill, refPrice) {
  return stations
    .map(st => {
      // 오피넷이 DISTANCE(m) 제공 → km로 변환, 도로거리 보정 ×1.3
      const dist = (st.distance / 1000) * 1.3;
      return { ...st, ...calcMetrics(dist, st.price, eff, fill, refPrice) };
    })
    .sort((a, b) => a.effPrice - b.effPrice);
}

// ── 카카오 모빌리티 실도로 거리 (선택 강화) ──
async function rankWithKakao(stations, eff, fill, refPrice) {
  // 가격순 상위 10 + 거리순 상위 5 = 최대 15개
  const byPrice = [...stations].sort((a, b) => a.price - b.price).slice(0, 10);
  const byDist  = [...stations].sort((a, b) => a.distance - b.distance).slice(0, 5);
  const candidates = [...new Map([...byPrice, ...byDist].map(s => [s.id, s])).values()];

  let done = 0;
  const withRoad = await Promise.all(candidates.map(async st => {
    try {
      const meters = await kakaoDistance(S.myLng, S.myLat, st.lng, st.lat);
      done++;
      setStatus(`<span class="spinner"></span> 카카오 경로 계산 중 (${done}/${candidates.length})...`);
      return { ...st, ...calcMetrics(meters / 1000, st.price, eff, fill, refPrice) };
    } catch {
      const dist = (st.distance / 1000) * 1.3;
      return { ...st, ...calcMetrics(dist, st.price, eff, fill, refPrice) };
    }
  }));

  return withRoad.sort((a, b) => a.effPrice - b.effPrice);
}

async function kakaoDistance(oLng, oLat, dLng, dLat) {
  const url = `https://apis-navi.kakaomobility.com/v1/directions?origin=${oLng},${oLat}&destination=${dLng},${dLat}&priority=DISTANCE`;
  const resp = await fetch(url, {
    headers: { Authorization: `KakaoAK ${gs('kakaoRestKey')}` }
  });
  if (!resp.ok) throw new Error('Kakao API ' + resp.status);
  const data = await resp.json();
  const dist = data?.routes?.[0]?.summary?.distance;
  if (!dist) throw new Error('경로 없음');
  return dist; // meters
}

// ══════════════════════════════════════════
//  RENDER RESULTS
// ══════════════════════════════════════════
function renderResults(ranked, refPrice) {
  if (!ranked.length) { setStatus('결과 없음'); return; }

  const fill = parseFloat(document.getElementById('fillAmount').value);
  const best = ranked[0];
  // 가장 가까운 곳을 기준으로 절약액 계산
  const nearest = [...ranked].sort((a, b) => a.distKm - b.distKm)[0];
  const maxSaving = (nearest.effPrice - best.effPrice) * fill;

  const useKakao = !!gs('kakaoRestKey');
  const distNote = useKakao ? '카카오 실도로 거리' : '직선거리 ×1.4 추정';

  let html = `
    <div class="results-meta">
      <span>${ranked.length}개 주유소 · 실질 최저가 순</span>
      <span style="color:#484f58">${distNote}</span>
    </div>
    <div class="card" style="background:#0d1117;border-color:#238636;margin-bottom:14px">
      <div style="font-size:12px;color:#3fb950;margin-bottom:6px">💡 분석 기준</div>
      <div style="font-size:13px;color:#8b949e;line-height:1.6">
        현재 유류 참고가: <strong style="color:#e6edf3">${refPrice.toLocaleString()}원/L</strong><br>
        실질비용 = 주유량×단가 + (거리÷연비×참고가)
      </div>
    </div>`;

  ranked.forEach((st, i) => {
    const savingVsNearest = (nearest.effPrice - st.effPrice) * fill;
    const savingVsWorst   = (ranked[ranked.length-1].effPrice - st.effPrice) * fill;
    const barPct = maxSaving > 0 ? Math.max(0, (savingVsNearest / maxSaving) * 100) : 0;

    const rankClass = i === 0 ? 'rank1' : '';
    const badgeClass = ['r1','r2','r3'][i] || '';

    html += `
    <div class="station-card ${rankClass}" data-id="${st.id}" onclick="focusStation('${st.id}',${st.lat},${st.lng})"
      <div class="station-top">
        <div class="rank-badge ${badgeClass}">${i+1}</div>
        <div>
          <div class="station-name">${esc(st.name)}</div>
          <div class="station-sub">${esc(st.brand)}  ·  ${st.distKm.toFixed(1)}km</div>
        </div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">리터당 가격</div>
          <div class="metric-value c-red">${st.price.toLocaleString()}원</div>
        </div>
        <div class="metric">
          <div class="metric-label">이동 연료비</div>
          <div class="metric-value">${Math.round(st.travelCost).toLocaleString()}원</div>
        </div>
        <div class="metric">
          <div class="metric-label">실질 단가</div>
          <div class="metric-value c-green">${Math.round(st.effPrice).toLocaleString()}원/L</div>
        </div>
        <div class="metric">
          <div class="metric-label">총 실질비용</div>
          <div class="metric-value c-blue">${Math.round(st.totalCost).toLocaleString()}원</div>
        </div>
        ${i > 0 ? `
        <div class="metric-full">
          <span class="metric-label">가장 가까운 곳 대비</span>
          <span class="metric-value ${savingVsNearest >= 0 ? 'c-green' : 'c-red'}">
            ${savingVsNearest >= 0 ? '▼' : '▲'} ${Math.abs(Math.round(savingVsNearest)).toLocaleString()}원
          </span>
        </div>` : `
        <div class="metric-full">
          <span class="metric-label">🏆 이 주유소가 가장 효율적입니다</span>
          <span class="metric-value c-green">최적</span>
        </div>`}
      </div>
      ${i > 0 && savingVsNearest > 0 ? '' : ''}
    </div>`;
  });

  document.getElementById('results').innerHTML = html;
}

// ══════════════════════════════════════════
//  지도 (Leaflet + OpenStreetMap, API 키 불필요)

let _leafletMap = null;
let _markerMap  = {};   // station id → leaflet marker

async function renderMap(ranked) {
  // Leaflet CSS/JS 동적 로드
  if (!window.L) {
    await loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js');
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(link);
  }

  const container = document.getElementById('map-container');
  container.style.display = 'block';

  // 기존 지도 인스턴스 제거
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }
  _markerMap = {};

  _leafletMap = L.map('map', { zoomControl: true }).setView([S.myLat, S.myLng], 14);

  // OpenStreetMap 타일
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(_leafletMap);

  // ── 내 위치 마커 ──
  const myIcon = L.divIcon({
    className: '',
    html: `<div style="width:18px;height:18px;background:#4285f4;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);"></div>`,
    iconSize: [18, 18], iconAnchor: [9, 9],
  });
  L.marker([S.myLat, S.myLng], { icon: myIcon })
    .addTo(_leafletMap)
    .bindPopup('<div class="popup-name">📍 내 위치</div>');

  // ── 주유소 마커 ──
  const fill   = parseFloat(document.getElementById('fillAmount').value);
  const colors = ['#22c55e','#3fb950','#84cc16','#eab308','#f97316','#ef4444',
                  '#dc2626','#a855f7','#6366f1','#0ea5e9'];
  const best = ranked[0];

  ranked.forEach((st, i) => {
    const color   = colors[Math.min(i, colors.length - 1)];
    const saving  = Math.round((ranked[ranked.length-1].effPrice - st.effPrice) * fill);
    const distKm  = (st.distance / 1000).toFixed(1);

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${color};color:#fff;padding:4px 9px;border-radius:20px;
        font-size:12px;font-weight:800;white-space:nowrap;
        box-shadow:0 2px 8px rgba(0,0,0,.45);
        border:2px solid rgba(255,255,255,0.3);
        display:flex;align-items:center;gap:4px;">
        <span>${i+1}</span><span>${st.price.toLocaleString()}원</span>
      </div>`,
      iconAnchor: [30, 14],
    });

    const popup = `
      <div class="popup-name">${i===0?'🏆 ':''}${esc(st.name)}</div>
      <div class="popup-row"><span>리터당 가격</span><span class="popup-val red">${st.price.toLocaleString()}원/L</span></div>
      <div class="popup-row"><span>실질 단가</span><span class="popup-val green">${Math.round(st.effPrice).toLocaleString()}원/L</span></div>
      <div class="popup-row"><span>이동 연료비</span><span class="popup-val">${Math.round(st.travelCost).toLocaleString()}원</span></div>
      <div class="popup-row"><span>총 실질비용</span><span class="popup-val blue">${Math.round(st.totalCost).toLocaleString()}원</span></div>
      <div class="popup-row"><span>거리</span><span class="popup-val">${distKm}km</span></div>`;

    const marker = L.marker([st.lat, st.lng], { icon })
      .addTo(_leafletMap)
      .bindPopup(popup, { maxWidth: 220 });
    _markerMap[st.id] = marker;
  });

  // 전체 마커 보이도록 범위 조정
  const bounds = [
    [S.myLat, S.myLng],
    ...ranked.map(st => [st.lat, st.lng])
  ];
  _leafletMap.fitBounds(bounds, { padding: [30, 30] });
}

// 카드 클릭 → 지도 이동 + 팝업 열기
function focusStation(id, lat, lng) {
  if (!_leafletMap) return;

  // 지도로 스크롤
  document.getElementById('map-container').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 카드 하이라이트
  document.querySelectorAll('.station-card').forEach(el => el.classList.remove('focused'));
  const card = document.querySelector(`.station-card[data-id="${id}"]`);
  if (card) card.classList.add('focused');

  // 지도 이동 + 팝업
  setTimeout(() => {
    _leafletMap.setView([lat, lng], 16, { animate: true });
    const marker = _markerMap[id];
    if (marker) marker.openPopup();
  }, 300);
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function setStatus(html) {
  const el = document.getElementById('statusArea');
  el.innerHTML = html ? `<div class="status">${html}</div>` : '';
}

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 22px;border-radius:20px;z-index:999;font-size:14px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}
